<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BisnisHub Dashboard Ringan</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:#eef2f7;color:#0f172a}.app{min-height:100vh}.sidebar{width:280px;min-width:280px}.menu-btn{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:18px;font-weight:900;font-size:13px;transition:.15s}.menu-btn.active{background:#4f46e5;color:white;box-shadow:0 10px 20px #4f46e533}.menu-btn:not(.active){color:#475569}.menu-btn:not(.active):hover{background:#f1f5f9;color:#4f46e5}.admin .menu-btn.active{background:#10b981;color:#052e16}.card{background:white;border:1px solid #e2e8f0;border-radius:26px;box-shadow:0 2px 10px #0f172a0a}.kpi{min-height:128px}.subtab{padding:10px 14px;border-radius:14px;font-weight:900;font-size:12px;border:1px solid #e2e8f0;background:#fff;color:#475569}.subtab.active{background:#4f46e5;color:#fff;border-color:#4f46e5}.admin .subtab.active{background:#10b981;color:#052e16;border-color:#10b981}.table-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:20px}.fade{animation:fade .18s ease-out both}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.modal{display:none}.modal.open{display:flex}@media(max-width:900px){.layout{display:block}.sidebar{width:100%;min-width:0;position:sticky;top:0;z-index:20}.side-menu{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px}.side-menu::-webkit-scrollbar{display:none}.menu-btn{min-width:112px;justify-content:center;flex-direction:column;gap:5px;padding:10px}.content{padding-top:14px}.kpi{min-height:110px}}</style></head><body><div id="app" class="app"></div><div id="toast" class="fixed bottom-5 right-5 z-[80] hidden bg-slate-950 text-white px-5 py-3 rounded-2xl shadow-xl text-sm font-black"></div><div id="loginModal" class="modal fixed inset-0 z-[100] bg-slate-950/80 backdrop-blur-sm items-center justify-center p-4"><div class="bg-white rounded-[28px] shadow-2xl max-w-md w-full overflow-hidden"><div class="p-5 bg-slate-50 border-b flex justify-between items-center"><b class="text-lg">Masuk BisnisHub</b><button onclick="closeLogin()" class="w-9 h-9 rounded-xl hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button></div><div class="p-6 space-y-4"><p class="text-sm text-slate-500">Masukkan email. Email yang mengandung kata <b>admin</b> akan masuk Panel Admin, selain itu masuk Dashboard User.</p><input id="loginEmail" class="w-full border rounded-2xl p-3" value="admin@bisnishub.id" placeholder="email@domain.com"><input id="loginName" class="w-full border rounded-2xl p-3" value="Admin Pusat" placeholder="Nama"><button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl py-3 font-black">Masuk</button><div class="grid grid-cols-2 gap-2"><button onclick="demoAdmin()" class="bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-2xl py-3 font-black text-sm">Demo Admin</button><button onclick="demoUser()" class="bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-2xl py-3 font-black text-sm">Demo User</button></div></div></div></div><script>const LS='bh_clean_dash_v1';let S=JSON.parse(localStorage.getItem(LS)||'{}');S={role:S.role||'guest',email:S.email||'',name:S.name||'User Demo',adminMenu:S.adminMenu||'overview',adminSub:S.adminSub||'',userMenu:S.userMenu||'overview',userSub:S.userSub||'',theme:S.theme||'indigo'};const save=()=>localStorage.setItem(LS,JSON.stringify(S));const rp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);const toast=m=>{let t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),1800)};const badge=(t,c='indigo')=>`<span class="inline-flex px-2.5 py-1 rounded-lg bg-${c}-50 text-${c}-700 border border-${c}-100 text-xs font-black">${t}</span>`;const btn=(t,c='indigo',fn="toast('Berhasil diproses')")=>`<button onclick="${fn}" class="px-3 py-2 rounded-xl bg-${c}-600 hover:bg-${c}-700 text-white text-xs font-black whitespace-nowrap">${t}</button>`;const kpi=(t,v,i,c='indigo',s='')=>`<div class="card kpi p-5"><div class="flex justify-between gap-3"><div class="min-w-0"><p class="text-[11px] text-slate-500 font-black uppercase tracking-wide">${t}</p><h3 class="text-2xl lg:text-3xl font-black mt-2 truncate">${v}</h3>${s?`<p class="text-xs text-slate-500 mt-1">${s}</p>`:''}</div><div class="w-12 h-12 rounded-2xl bg-${c}-50 text-${c}-600 flex items-center justify-center shrink-0"><i class="fa-solid ${i}"></i></div></div></div>`;const panel=(t,sub,body,act='')=>`<section class="card overflow-hidden fade"><div class="p-5 border-b bg-white flex flex-col md:flex-row md:items-center md:justify-between gap-3"><div><h2 class="text-xl font-black">${t}</h2><p class="text-sm text-slate-500 mt-1">${sub}</p></div>${act}</div><div class="p-5">${body}</div></section>`;const tbl=(h,r)=>`<div class="table-wrap"><table class="w-full text-sm"><thead class="bg-slate-50 text-slate-500 uppercase text-xs"><tr>${h.map(x=>`<th class="text-left px-4 py-3 font-black whitespace-nowrap">${x}</th>`).join('')}</tr></thead><tbody>${r.join('')}</tbody></table></div>`;let users=[['USR-001','Andi Surya','andi@company.id','User','Aktif','12'],['USR-002','Budi Perkasa','budi@vendor.id','Vendor','Review','4'],['USR-003','Admin Pusat','admin@bisnishub.id','Admin','Aktif','0']];let sellers=[['PT Bintang Pompa','Terverifikasi','42 Produk',rp(245000000)],['CV Agro Mandiri','Review','18 Produk',rp(85000000)],['Toko Teknik Jaya','Aktif','33 Produk',rp(125000000)]];let products=[['Pompa Sentrifugal Industri 30kW','PT Bintang Pompa',rp(24500000),'45.5%','Aktif'],['Traktor Tangan Diesel G1000','CV Agro Mandiri',rp(15500000),'38.2%','Review'],['Mesin Press Hidrolik 50 Ton','CV Baja Mandiri',rp(45000000),'35.8%','Aktif']];let orders=[['INV-001','Andi Surya','PT Bintang Pompa',rp(24500000),'Dikirim'],['INV-002','Siti Aminah','CV Agro Mandiri',rp(15500000),'Diproses'],['INV-003','PT Pabrik Baja','CV Baja Mandiri',rp(90000000),'Selesai']];let tickets=[['TKT-001','Andi Surya','Pengiriman terlambat','Tinggi','Open'],['TKT-002','Budi Perkasa','Upload dokumen gagal','Sedang','Proses']];let tenders=[['Pengadaan 50 Unit Pompa Irigasi','Dinas Pertanian Jateng',rp(1250000000),'14 Bid','Open'],['Sewa 10 Excavator PC200','PT Tambang Makmur',rp(15000000000),'8 Bid','Review']];const adminMenus=[['overview','fa-gauge-high','Overview'],['users','fa-users','User & Role'],['sellers','fa-store','Seller/Vendor'],['products','fa-boxes-stacked','Produk'],['orders','fa-receipt','Order & Refund'],['tenders','fa-briefcase','Tender'],['support','fa-headset','Support'],['cms','fa-palette','CMS Tampilan'],['finance','fa-vault','Keuangan'],['settings','fa-gear','Setting Sistem']];const userMenus=[['overview','fa-gauge','Ringkasan'],['orders','fa-box-open','Pesanan'],['addProduct','fa-circle-plus','Tambah Produk'],['store','fa-store','Kelola Toko'],['wishlist','fa-heart','Wishlist'],['address','fa-location-dot','Alamat'],['support','fa-headset','Bantuan'],['notif','fa-bell','Notifikasi'],['security','fa-lock','Keamanan'],['profile','fa-user-gear','Profil']];const adminSubs={overview:['Ringkasan','Aktivitas','Audit'],users:['Daftar User','Role & Akses','Verifikasi','Segmentasi'],sellers:['Ringkasan Seller','Verifikasi Seller','Audit Vendor','Withdraw'],products:['Review Produk','Produk Aktif','Kategori','Stok & Harga'],orders:['Order Aktif','Refund','Dispute','Invoice'],tenders:['Tender Open','Moderasi','Bid Masuk','Arsip'],support:['Tiket Open','Prioritas','Riwayat','Template Balasan'],cms:['Banner','Menu Mobile','Warna Tema','Pengumuman'],finance:['Escrow','Komisi','Pencairan','Rekening'],settings:['Status Platform','Approval','Payment','Keamanan Login','Integrasi API','Backup & Log']};const userSubs={overview:['Ringkasan','Aktivitas','Rekomendasi'],orders:['Semua Pesanan','Dikirim','Selesai','Komplain'],addProduct:['Info Produk','Harga & Stok','Gambar & Media','Spesifikasi','Legal/TKDN','Pengiriman','Preview'],store:['Profil Toko','Legalitas','Rekening','Kurir & Gudang','Jam Operasional','Kebijakan','Preview Toko'],wishlist:['Produk Disimpan','Supplier Favorit'],address:['Alamat Proyek','Gudang','Tambah Alamat'],support:['Tiket Saya','Buat Tiket','Riwayat'],notif:['Order','Promo','Tender'],security:['Password','OTP','Perangkat'],profile:['Biodata','Perusahaan','Preferensi']};function openLogin(){document.getElementById('loginModal').classList.add('open')}function closeLogin(){document.getElementById('loginModal').classList.remove('open')}function demoAdmin(){document.getElementById('loginEmail').value='admin@bisnishub.id';document.getElementById('loginName').value='Admin Pusat';login()}function demoUser(){document.getElementById('loginEmail').value='user@bisnishub.id';document.getElementById('loginName').value='User Demo';login()}function login(){let e=document.getElementById('loginEmail').value.trim().toLowerCase(),n=document.getElementById('loginName').value.trim()||'User Demo';S.email=e;S.name=n;S.role=(e.includes('admin')||e.includes('sridamayanti'))?'admin':'user';S.adminMenu='overview';S.userMenu='overview';save();closeLogin();render();toast('Masuk sebagai '+S.role.toUpperCase())}function logout(){localStorage.removeItem(LS);S={role:'guest',email:'',name:'User Demo',adminMenu:'overview',adminSub:'',userMenu:'overview',userSub:''};render()}function setAdmin(m){S.adminMenu=m;S.adminSub='';save();render()}function setAdminSub(s){S.adminSub=s;save();renderAdminContent()}function setUser(m){S.userMenu=m;S.userSub='';save();render()}function setUserSub(s){S.userSub=s;save();renderUserContent()}function side(menus,active,fn,admin=false){return menus.map(([k,i,l])=>`<button class="menu-btn ${active===k?'active':''}" onclick="${fn}('${k}')"><i class="fa-solid ${i} w-5 text-center"></i><span>${l}</span></button>`).join('')}function shell(type){let isAdmin=type==='admin',menus=isAdmin?adminMenus:userMenus,active=isAdmin?S.adminMenu:S.userMenu,fn=isAdmin?'setAdmin':'setUser';return `<header class="bg-white border-b sticky top-0 z-40"><div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-11 h-11 rounded-2xl ${isAdmin?'bg-emerald-400 text-emerald-950':'bg-indigo-600 text-white'} flex items-center justify-center font-black">${isAdmin?'AD':'US'}</div><div><h1 class="font-black text-xl">${isAdmin?'Panel Admin Pusat':'Dashboard User'}</h1><p class="text-xs text-slate-500">${S.name} • ${S.email}</p></div></div><div class="flex gap-2"><button onclick="openLogin()" class="px-4 py-2 rounded-xl bg-slate-100 font-black text-sm">Ganti Akun</button><button onclick="logout()" class="px-4 py-2 rounded-xl bg-rose-600 text-white font-black text-sm">Logout</button></div></div></header><main class="${isAdmin?'admin':''} max-w-7xl mx-auto p-4"><div class="layout flex gap-5"><aside class="sidebar card p-3 h-max"><nav class="side-menu grid gap-2">${side(menus,active,fn,isAdmin)}</nav></aside><section class="content flex-1 min-w-0" id="mainContent"></section></div></main>`}function subTabs(list,active,fn){return `<div class="flex flex-wrap gap-2 mb-5">${list.map(x=>`<button onclick="${fn}('${x}')" class="subtab ${active===x?'active':''}">${x}</button>`).join('')}</div>`}function render(){let app=document.getElementById('app');if(S.role==='guest'){app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-900 to-slate-950"><div class="bg-white rounded-[32px] p-8 max-w-lg w-full shadow-2xl text-center"><div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-amber-300 to-orange-500 mx-auto flex items-center justify-center text-indigo-950 text-2xl font-black">BH</div><h1 class="text-3xl font-black mt-5">BisnisHub Dashboard Ringan</h1><p class="text-slate-500 mt-2">Versi bersih: hanya dashboard admin dan user. Marketplace, TKDN, kalkulator, paywall, dan script lama sudah dibuang agar ringan diedit.</p><button onclick="openLogin()" class="mt-6 bg-indigo-600 text-white rounded-2xl px-7 py-3 font-black">Masuk Dashboard</button></div></div>`;return}app.innerHTML=shell(S.role);S.role==='admin'?renderAdminContent():renderUserContent()}function renderAdminContent(){let key=S.adminMenu,subs=adminSubs[key]||[],active=S.adminSub||subs[0];S.adminSub=active;save();let body='';if(key==='overview')body=adminOverview();if(key==='users')body=adminUsers();if(key==='sellers')body=adminSellers();if(key==='products')body=adminProducts();if(key==='orders')body=adminOrders();if(key==='tenders')body=adminTenders();if(key==='support')body=adminSupport();if(key==='cms')body=adminCMS();if(key==='finance')body=adminFinance();if(key==='settings')body=adminSettings();document.getElementById('mainContent').innerHTML=`${subTabs(subs,active,'setAdminSub')}${body}`}function adminOverview(){return `<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-5">${kpi('GMV Platform',rp(1450800000),'fa-chart-line','emerald','+18% bulan ini')}${kpi('User Aktif',users.length,'fa-users','indigo','Admin/User/Vendor')}${kpi('Seller',sellers.length,'fa-store','amber','Vendor terdaftar')}${kpi('Escrow',rp(145080000),'fa-vault','rose','Dana tertahan')}</div>${panel('Ringkasan Admin','Kontrol pusat platform BisnisHub.',`<div class="grid md:grid-cols-3 gap-4"><div class="p-5 rounded-2xl bg-emerald-50 border border-emerald-100"><b>Stabil</b><p class="text-sm text-slate-500 mt-1">Role admin/user sudah dipisah.</p></div><div class="p-5 rounded-2xl bg-indigo-50 border border-indigo-100"><b>Ringan</b><p class="text-sm text-slate-500 mt-1">Kode lama tidak dipakai sudah dibuang.</p></div><div class="p-5 rounded-2xl bg-amber-50 border border-amber-100"><b>Siap Edit</b><p class="text-sm text-slate-500 mt-1">Dashboard bersih dan mudah dikembangkan.</p></div></div>`)}`}function adminUsers(){return panel('User & Role','Kelola akun, akses, dan status user.',tbl(['ID','Nama','Email','Role','Status','Aksi'],users.map(u=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${u[0]}</td><td class="px-4 py-3">${u[1]}</td><td class="px-4 py-3">${u[2]}</td><td class="px-4 py-3">${u[3]}</td><td class="px-4 py-3">${badge(u[4],u[4]==='Aktif'?'emerald':'amber')}</td><td class="px-4 py-3">${btn('Edit','indigo')} ${btn('Suspend','rose')}</td></tr>`)),btn('Tambah User','emerald'))}function adminSellers(){return panel('Seller / Vendor','Ringkasan dan verifikasi vendor tampil di kanan.',tbl(['Seller','Status','Produk','Omzet','Aksi'],sellers.map(s=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${s[0]}</td><td class="px-4 py-3">${badge(s[1],s[1]==='Review'?'amber':'emerald')}</td><td class="px-4 py-3">${s[2]}</td><td class="px-4 py-3 font-black">${s[3]}</td><td class="px-4 py-3">${btn('Verifikasi','emerald')} ${btn('Audit','indigo')}</td></tr>`)),btn('Export Seller','slate'))}function adminProducts(){return panel('Produk','Moderasi produk seller.',tbl(['Produk','Seller','Harga','TKDN','Status','Aksi'],products.map(p=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${p[0]}</td><td class="px-4 py-3">${p[1]}</td><td class="px-4 py-3">${p[2]}</td><td class="px-4 py-3">${p[3]}</td><td class="px-4 py-3">${badge(p[4],p[4]==='Aktif'?'emerald':'amber')}</td><td class="px-4 py-3">${btn('Approve','emerald')} ${btn('Tolak','rose')}</td></tr>`)))}function adminOrders(){return panel('Order & Refund','Pantau transaksi dan dispute.',tbl(['Invoice','Buyer','Seller','Total','Status','Aksi'],orders.map(o=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${o[0]}</td><td class="px-4 py-3">${o[1]}</td><td class="px-4 py-3">${o[2]}</td><td class="px-4 py-3 font-black">${o[3]}</td><td class="px-4 py-3">${badge(o[4],o[4]==='Selesai'?'emerald':'blue')}</td><td class="px-4 py-3">${btn('Audit','indigo')} ${btn('Refund','rose')}</td></tr>`)))}function adminTenders(){return panel('Tender','Kelola tender dan penawaran.',tbl(['Tender','Owner','HPS','Bid','Status','Aksi'],tenders.map(t=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${t[0]}</td><td class="px-4 py-3">${t[1]}</td><td class="px-4 py-3 font-black">${t[2]}</td><td class="px-4 py-3">${t[3]}</td><td class="px-4 py-3">${badge(t[4],t[4]==='Open'?'emerald':'amber')}</td><td class="px-4 py-3">${btn('Moderasi','indigo')} ${btn('Tutup','rose')}</td></tr>`)),btn('Posting Tender','emerald'))}function adminSupport(){return panel('Support','Kelola tiket bantuan.',tbl(['ID','User','Topik','Prioritas','Status','Aksi'],tickets.map(t=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${t[0]}</td><td class="px-4 py-3">${t[1]}</td><td class="px-4 py-3">${t[2]}</td><td class="px-4 py-3">${badge(t[3],t[3]==='Tinggi'?'rose':'amber')}</td><td class="px-4 py-3">${badge(t[4],t[4]==='Open'?'rose':'amber')}</td><td class="px-4 py-3">${btn('Balas','indigo')} ${btn('Close','emerald')}</td></tr>`)))}function adminCMS(){return panel('CMS Tampilan','Atur tampilan dashboard.',`<div class="grid md:grid-cols-2 gap-4"><input class="border rounded-2xl p-3" value="BisnisHub Dashboard"><select class="border rounded-2xl p-3"><option>Indigo</option><option>Emerald</option><option>Amber</option></select></div><button onclick="toast('CMS disimpan')" class="mt-4 bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Simpan CMS</button>`)}function adminFinance(){return panel('Keuangan & Escrow','Pantau escrow, komisi, dan pencairan.',`<div class="grid md:grid-cols-3 gap-4 mb-5">${kpi('Escrow Total',rp(1450800000),'fa-vault','emerald')}${kpi('Siap Cair',rp(245000000),'fa-money-bill-transfer','blue')}${kpi('Komisi','5%','fa-percent','amber')}</div><button onclick="toast('Laporan keuangan dibuat')" class="bg-emerald-600 text-white rounded-2xl px-5 py-3 font-black">Export Laporan</button>`)}function adminSettings(){return panel('Setting Sistem','Pengaturan global aplikasi.',`<div class="grid md:grid-cols-2 gap-4"><label class="flex justify-between border rounded-2xl p-5"><span class="font-black">Website Online</span><input type="checkbox" checked></label><label class="flex justify-between border rounded-2xl p-5"><span class="font-black">Maintenance Mode</span><input type="checkbox"></label><label class="flex justify-between border rounded-2xl p-5"><span class="font-black">Auto Approve Produk</span><input type="checkbox"></label><label class="flex justify-between border rounded-2xl p-5"><span class="font-black">OTP Login</span><input type="checkbox" checked></label></div>`)}function renderUserContent(){let key=S.userMenu,subs=userSubs[key]||[],active=S.userSub||subs[0];S.userSub=active;save();let body='';if(key==='overview')body=userOverview();if(key==='orders')body=userOrders();if(key==='addProduct')body=userAddProduct();if(key==='store')body=userStore();if(key==='wishlist')body=userWishlist();if(key==='address')body=userAddress();if(key==='support')body=userSupport();if(key==='notif')body=userNotif();if(key==='security')body=userSecurity();if(key==='profile')body=userProfile();document.getElementById('mainContent').innerHTML=`${subTabs(subs,active,'setUserSub')}${body}`}function userOverview(){return `<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-5">${kpi('Pesanan','12','fa-box-open','indigo')}${kpi('Belanja',rp(155000000),'fa-wallet','emerald')}${kpi('Produk Draft','3','fa-box','amber')}${kpi('Tiket Open','1','fa-headset','rose')}</div>${panel('Ringkasan User','Area kerja user bersih tanpa admin/marketplace.',`<div class="grid md:grid-cols-3 gap-4"><button onclick="setUser('orders')" class="p-5 rounded-2xl bg-indigo-50 border text-left"><b>Pesanan Saya</b><p class="text-sm text-slate-500">Lacak order dan invoice.</p></button><button onclick="setUser('addProduct')" class="p-5 rounded-2xl bg-amber-50 border text-left"><b>Tambah Produk</b><p class="text-sm text-slate-500">Upload produk lengkap.</p></button><button onclick="setUser('store')" class="p-5 rounded-2xl bg-emerald-50 border text-left"><b>Kelola Toko</b><p class="text-sm text-slate-500">Setting toko di kanan.</p></button></div>`)}`}function userOrders(){return panel('Pesanan Saya','Kelola pesanan user.',tbl(['Invoice','Produk','Total','Status','Aksi'],orders.map(o=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${o[0]}</td><td class="px-4 py-3">${o[2]}</td><td class="px-4 py-3 font-black">${o[3]}</td><td class="px-4 py-3">${badge(o[4],'blue')}</td><td class="px-4 py-3">${btn('Lacak','blue')} ${btn('Komplain','rose')}</td></tr>`)))}function userAddProduct(){return panel('Tambah Produk','Form lengkap upload produk.',`<div class="grid md:grid-cols-2 gap-4"><input class="border rounded-2xl p-3" placeholder="Nama produk"><select class="border rounded-2xl p-3"><option>Kategori Industri</option><option>Pompa & Kompresor</option><option>Mesin Pertanian</option></select><input class="border rounded-2xl p-3" placeholder="Brand / Merek"><input class="border rounded-2xl p-3" placeholder="SKU"><input class="border rounded-2xl p-3" placeholder="Harga Retail"><input class="border rounded-2xl p-3" placeholder="Harga Grosir / B2B"><input class="border rounded-2xl p-3" placeholder="Stok"><input class="border rounded-2xl p-3" placeholder="MOQ"><input type="file" class="border rounded-2xl p-3 md:col-span-2"><textarea class="border rounded-2xl p-3 md:col-span-2" rows="4" placeholder="Spesifikasi teknis dan deskripsi produk"></textarea><input class="border rounded-2xl p-3" placeholder="Nilai TKDN %"><input class="border rounded-2xl p-3" placeholder="No. Sertifikat / Dokumen"></div><div class="mt-5 flex flex-wrap gap-2"><button onclick="toast('Draft produk disimpan')" class="bg-slate-900 text-white rounded-2xl px-5 py-3 font-black">Simpan Draft</button><button onclick="toast('Produk diajukan ke admin')" class="bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Ajukan ke Admin</button></div>`)}function userStore(){return panel('Kelola Toko','Semua submenu toko tampil di kanan, bukan di sidebar.',`<div class="grid md:grid-cols-2 gap-4"><input class="border rounded-2xl p-3" value="Toko ${S.name}"><input class="border rounded-2xl p-3" placeholder="Slogan toko"><input class="border rounded-2xl p-3" placeholder="NIB"><input class="border rounded-2xl p-3" placeholder="NPWP"><input class="border rounded-2xl p-3" placeholder="Rekening pencairan"><input class="border rounded-2xl p-3" placeholder="Gudang asal"><textarea class="border rounded-2xl p-3 md:col-span-2" rows="4" placeholder="Kebijakan toko, retur, garansi, dan operasional"></textarea></div><button onclick="toast('Setting toko tersimpan')" class="mt-5 bg-emerald-600 text-white rounded-2xl px-5 py-3 font-black">Simpan Toko</button>`)}function userWishlist(){return panel('Wishlist','Produk favorit user.',`<div class="grid md:grid-cols-3 gap-4">${products.map(p=>`<div class="border rounded-2xl p-4"><div class="h-28 rounded-xl bg-slate-100 flex items-center justify-center mb-3"><i class="fa-solid fa-box text-3xl text-slate-300"></i></div><b>${p[0]}</b><p class="font-black text-amber-600 mt-2">${p[2]}</p>${btn('Beli','indigo')}</div>`).join('')}</div>`)}function userAddress(){return panel('Alamat Proyek','Kelola alamat kantor, gudang, dan proyek.',`<div class="grid md:grid-cols-2 gap-4"><div class="border rounded-2xl p-4"><b>Kantor Pusat</b><p class="text-sm text-slate-500 mt-1">Jakarta Selatan</p></div><div class="border rounded-2xl p-4"><b>Gudang Proyek</b><p class="text-sm text-slate-500 mt-1">Karawang</p></div></div><button onclick="toast('Alamat ditambahkan')" class="mt-4 bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Tambah Alamat</button>`)}function userSupport(){return panel('Bantuan','Tiket bantuan user.',tbl(['ID','Topik','Status','Aksi'],tickets.map(t=>`<tr class="border-t"><td class="px-4 py-3 font-bold">${t[0]}</td><td class="px-4 py-3">${t[2]}</td><td class="px-4 py-3">${badge(t[4],'amber')}</td><td class="px-4 py-3">${btn('Balas','indigo')}</td></tr>`)),btn('Buat Tiket','rose'))}function userNotif(){return panel('Notifikasi','Pusat pesan user.',`<div class="space-y-3">${['Pesanan sedang dikirim','Produk draft perlu dilengkapi','Tiket dibalas admin'].map(x=>`<div class="border rounded-2xl p-4"><i class="fa-solid fa-bell text-indigo-600 mr-2"></i><b>${x}</b></div>`).join('')}</div>`)}function userSecurity(){return panel('Keamanan','Password, OTP, dan perangkat.',`<div class="grid md:grid-cols-2 gap-4"><div class="border rounded-2xl p-5"><b>Password</b><p class="text-sm text-slate-500">Terakhir diubah 30 hari lalu</p>${btn('Ubah','indigo')}</div><div class="border rounded-2xl p-5"><b>OTP</b><p class="text-sm text-slate-500">Belum aktif</p>${btn('Aktifkan','emerald')}</div></div>`)}function userProfile(){return panel('Profil','Edit biodata user.',`<div class="grid md:grid-cols-2 gap-4"><input class="border rounded-2xl p-3" value="${S.name}"><input class="border rounded-2xl p-3" value="${S.email}"><input class="border rounded-2xl p-3" placeholder="No. HP"><select class="border rounded-2xl p-3"><option>Perusahaan</option><option>Perorangan</option></select></div><button onclick="toast('Profil tersimpan')" class="mt-5 bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Simpan Profil</button>`)}render();</script></body></html>
