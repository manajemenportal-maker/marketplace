<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BisnisHub Clean Marketplace + Dashboard Editable</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #eef2f7;
      color: #0f172a;
    }
    .app-shell { min-height: 100vh; }
    .sidebar {
      width: 280px;
      min-width: 280px;
    }
    .menu-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 900;
      transition: 0.15s ease;
      text-align: left;
    }
    .menu-button.active-admin {
      background: #10b981;
      color: #052e16;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.22);
    }
    .menu-button.active-user {
      background: #4f46e5;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.22);
    }
    .menu-button.idle-admin {
      color: #cbd5e1;
    }
    .menu-button.idle-admin:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }
    .menu-button.idle-user {
      color: #475569;
    }
    .menu-button.idle-user:hover {
      background: #f1f5f9;
      color: #4f46e5;
    }
    .content-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      overflow: hidden;
    }
    .kpi-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 20px;
      min-height: 130px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04);
    }
    .sub-tab {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      font-weight: 900;
      background: #ffffff;
      color: #475569;
      transition: 0.15s ease;
      white-space: nowrap;
    }
    .sub-tab.active {
      background: #0f172a;
      color: #ffffff;
      border-color: #0f172a;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #ffffff;
    }
    thead {
      background: #f8fafc;
      color: #64748b;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 900;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      vertical-align: top;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      display: none;
      background: #0f172a;
      color: #ffffff;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.35);
    }
    .toast.show { display: block; }

    @media (max-width: 900px) {
      .dashboard-layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 100%;
        position: static;
      }
      .sidebar-menu {
        display: flex;
        overflow-x: auto;
        gap: 8px;
        padding-bottom: 6px;
      }
      .menu-button {
        min-width: 165px;
        justify-content: flex-start;
      }
      .kpi-card { min-height: 110px; }
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell"></div>
  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'bisnishub_clean_editable_state_v2';

    const adminMenus = [
      { key: 'overview', label: 'Overview', icon: 'fa-gauge-high' },
      { key: 'users', label: 'User & Role', icon: 'fa-users' },
      { key: 'sellers', label: 'Seller / Vendor', icon: 'fa-store' },
      { key: 'products', label: 'Produk', icon: 'fa-boxes-stacked' },
      { key: 'orders', label: 'Order & Refund', icon: 'fa-receipt' },
      { key: 'tenders', label: 'Tender', icon: 'fa-briefcase' },
      { key: 'support', label: 'Support', icon: 'fa-headset' },
      { key: 'cms', label: 'CMS Tampilan', icon: 'fa-palette' },
      { key: 'finance', label: 'Keuangan & Escrow', icon: 'fa-vault' },
      { key: 'settings', label: 'Setting Sistem', icon: 'fa-gear' }
    ];

    const userMenus = [
      { key: 'overview', label: 'Ringkasan', icon: 'fa-gauge' },
      { key: 'orders', label: 'Pesanan Saya', icon: 'fa-box-open' },
      { key: 'addProduct', label: 'Tambah Produk', icon: 'fa-circle-plus' },
      { key: 'store', label: 'Kelola Toko', icon: 'fa-store' },
      { key: 'wishlist', label: 'Wishlist', icon: 'fa-heart' },
      { key: 'address', label: 'Alamat Proyek', icon: 'fa-location-dot' },
      { key: 'support', label: 'Bantuan / Tiket', icon: 'fa-headset' },
      { key: 'notif', label: 'Notifikasi', icon: 'fa-bell' },
      { key: 'security', label: 'Keamanan', icon: 'fa-lock' },
      { key: 'profile', label: 'Profil User', icon: 'fa-user-gear' }
    ];

    const adminSubs = {
      overview: ['Ringkasan', 'Aktivitas', 'Kinerja'],
      users: ['Daftar User', 'Role & Akses', 'Verifikasi', 'Segmentasi'],
      sellers: ['Ringkasan Seller', 'Verifikasi Seller', 'Audit Vendor', 'Withdraw'],
      products: ['Review Produk', 'Produk Aktif', 'Kategori', 'Stok & Harga', 'Dokumen'],
      orders: ['Transaksi', 'Refund', 'Dispute', 'Invoice'],
      tenders: ['Tender Open', 'Review Tender', 'Bidding', 'Arsip'],
      support: ['Tiket Open', 'SLA', 'Chat Bantuan', 'Riwayat'],
      cms: ['Hero Banner', 'Menu Mobile', 'Warna Icon', 'Landing'],
      finance: ['Escrow', 'Komisi', 'Pencairan', 'Laporan'],
      settings: ['Status Platform', 'Approval', 'Payment', 'Keamanan Login', 'Integrasi API', 'Backup & Log']
    };

    const userSubs = {
      overview: ['Ringkasan', 'Aktivitas', 'Rekomendasi'],
      orders: ['Semua Pesanan', 'Diproses', 'Dikirim', 'Selesai', 'Komplain'],
      addProduct: ['Info Produk', 'Harga & Stok', 'Gambar & Media', 'Spesifikasi', 'Dokumen', 'Pengiriman', 'Preview'],
      store: ['Profil Toko', 'Legalitas', 'Rekening', 'Kurir & Gudang', 'Jam Operasional', 'Kebijakan', 'Preview Toko'],
      wishlist: ['Produk Disimpan', 'Supplier Favorit', 'Riwayat Dilihat'],
      address: ['Alamat Utama', 'Gudang', 'Proyek', 'Tambah Alamat'],
      support: ['Buat Tiket', 'Tiket Saya', 'Chat Admin', 'FAQ'],
      notif: ['Semua', 'Order', 'Promo', 'Sistem'],
      security: ['Password', 'OTP', 'Perangkat Login', 'Log Aktivitas'],
      profile: ['Biodata', 'Perusahaan', 'Kontak', 'Preferensi']
    };

    const demoUsers = [
      ['USR-001', 'Andi Surya', 'andi@company.id', 'Buyer', 'Aktif'],
      ['USR-002', 'Budi Perkasa', 'budi@vendor.id', 'Seller', 'Verifikasi'],
      ['USR-003', 'Siti Aminah', 'siti@pabrik.id', 'Buyer', 'Aktif'],
      ['USR-004', 'Rama Teknik', 'rama@teknik.id', 'Seller', 'Suspend']
    ];

    const demoProducts = [
      ['Pompa Sentrifugal Industri 30kW', 'PT Bintang Pompa', 'Rp 24.500.000', 'TKDN 45.5%', 'Aktif'],
      ['Traktor Tangan Diesel G1000', 'CV Agro Mandiri', 'Rp 15.500.000', 'TKDN 38.2%', 'Review'],
      ['Mesin Press Hidrolik 50 Ton', 'CV Baja Mandiri', 'Rp 45.000.000', 'TKDN 35.8%', 'Aktif'],
      ['Helm Safety SNI Proyek', 'PT Plastik Indo', 'Rp 45.000', 'TKDN 80%', 'Aktif']
    ];

    const marketplaceProducts = [
      { name: 'Pompa Sentrifugal Industri 30kW', seller: 'PT Bintang Pompa', category: 'Pompa & Kompresor', price: 'Rp 24.500.000', badge: 'B2B', icon: 'fa-water' },
      { name: 'Traktor Tangan Diesel G1000', seller: 'CV Agro Mandiri', category: 'Mesin Pertanian', price: 'Rp 15.500.000', badge: 'Agro', icon: 'fa-tractor' },
      { name: 'Mesin Press Hidrolik 50 Ton', seller: 'CV Baja Mandiri', category: 'Hydrolik', price: 'Rp 45.000.000', badge: 'TKDN', icon: 'fa-gears' },
      { name: 'Helm Safety SNI Proyek', seller: 'PT Plastik Indo', category: 'K3 Safety', price: 'Rp 45.000', badge: 'SNI', icon: 'fa-helmet-safety' },
      { name: 'Panel Surya 450Wp Monocrystalline', seller: 'PT Surya Energi', category: 'Energi', price: 'Rp 2.100.000', badge: 'Green', icon: 'fa-solar-panel' },
      { name: 'Software ERP Inventory Pabrik', seller: 'BisnisHub Digital', category: 'Software', price: 'Rp 15.000.000', badge: 'Digital', icon: 'fa-laptop-code' }
    ];

    const demoOrders = [
      ['INV-001', 'Andi Surya', 'Pompa Sentrifugal', 'Rp 24.500.000', 'Dikirim'],
      ['INV-002', 'Siti Aminah', 'Traktor Tangan', 'Rp 15.500.000', 'Diproses'],
      ['INV-003', 'PT Pabrik Baja', 'Mesin Press', 'Rp 90.000.000', 'Selesai']
    ];

    const demoTenders = [
      ['Pengadaan 50 Pompa Irigasi', 'Dinas Pertanian Jateng', 'Rp 1.250.000.000', '14 Bid', 'Open'],
      ['Sewa 10 Excavator PC200', 'PT Tambang Makmur', 'Rp 15.000.000.000', '8 Bid', 'Review'],
      ['Pengadaan Helm Safety 5000 pcs', 'Kontraktor Nasional', 'Rp 350.000.000', '23 Bid', 'Close']
    ];

    const demoTickets = [
      ['TKT-001', 'Andi Surya', 'Pengiriman terlambat', 'Tinggi', 'Open'],
      ['TKT-002', 'Budi Perkasa', 'Upload TKDN gagal', 'Sedang', 'Proses'],
      ['TKT-003', 'Siti Aminah', 'Minta invoice pajak', 'Rendah', 'Close']
    ];

    let state = loadState();

    function loadState() {
      const defaultState = {
        role: 'marketplace',
        name: 'Pengunjung',
        adminMenu: 'overview',
        userMenu: 'overview',
        adminSub: 'Ringkasan',
        userSub: 'Ringkasan'
      };

      try {
        return { ...defaultState, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') };
      } catch (error) {
        return defaultState;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function badge(text, color = 'indigo') {
      const colorMap = {
        indigo: 'bg-indigo-50 text-indigo-700 border-indigo-100',
        emerald: 'bg-emerald-50 text-emerald-700 border-emerald-100',
        amber: 'bg-amber-50 text-amber-700 border-amber-100',
        rose: 'bg-rose-50 text-rose-700 border-rose-100',
        blue: 'bg-blue-50 text-blue-700 border-blue-100',
        slate: 'bg-slate-50 text-slate-700 border-slate-200'
      };
      return `<span class="inline-flex px-2.5 py-1 rounded-lg border text-xs font-black ${colorMap[color] || colorMap.indigo}">${text}</span>`;
    }

    function statusColor(status) {
      const map = {
        Aktif: 'emerald',
        Open: 'emerald',
        Selesai: 'emerald',
        Dikirim: 'blue',
        Diproses: 'amber',
        Review: 'amber',
        Verifikasi: 'amber',
        Proses: 'amber',
        Tinggi: 'rose',
        Suspend: 'rose',
        Close: 'slate'
      };
      return map[status] || 'indigo';
    }

    function actionButton(label, color = 'indigo') {
      const colorMap = {
        indigo: 'bg-indigo-600 hover:bg-indigo-700',
        emerald: 'bg-emerald-600 hover:bg-emerald-700',
        amber: 'bg-amber-500 hover:bg-amber-600 text-slate-950',
        rose: 'bg-rose-600 hover:bg-rose-700',
        slate: 'bg-slate-900 hover:bg-slate-950'
      };
      return `<button onclick="showToast('${label} diproses')" class="px-4 py-2 rounded-xl text-white text-xs font-black whitespace-nowrap ${colorMap[color] || colorMap.indigo}">${label}</button>`;
    }

    function kpiCard(title, value, icon, color = 'indigo', note = '') {
      const colorMap = {
        indigo: 'bg-indigo-50 text-indigo-600',
        emerald: 'bg-emerald-50 text-emerald-600',
        amber: 'bg-amber-50 text-amber-600',
        rose: 'bg-rose-50 text-rose-600',
        blue: 'bg-blue-50 text-blue-600'
      };

      return `
        <div class="kpi-card">
          <div>
            <p class="text-xs text-slate-500 font-black uppercase tracking-wide">${title}</p>
            <h3 class="text-2xl font-black mt-2 leading-tight">${value}</h3>
            ${note ? `<p class="text-xs text-slate-500 mt-1">${note}</p>` : ''}
          </div>
          <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${colorMap[color] || colorMap.indigo}">
            <i class="fa-solid ${icon}"></i>
          </div>
        </div>
      `;
    }

    function panel(title, subtitle, body, actions = '') {
      return `
        <div class="content-card">
          <div class="p-5 border-b border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
              <h2 class="text-xl font-black text-slate-900">${title}</h2>
              <p class="text-sm text-slate-500 mt-1">${subtitle}</p>
            </div>
            ${actions}
          </div>
          <div class="p-5">${body}</div>
        </div>
      `;
    }

    function table(headers, rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>${headers.map(header => `<th>${header}</th>`).join('')}</tr>
            </thead>
            <tbody>${rows.join('')}</tbody>
          </table>
        </div>
      `;
    }

    function renderApp() {
      if (state.role === 'admin') {
        renderAdminDashboard();
      } else if (state.role === 'user') {
        renderUserDashboard();
      } else if (state.role === 'tender') {
        renderTenderMarketplace();
      } else {
        renderMarketplace();
      }
    }

    function renderHeader(title, subtitle, isAdmin) {
      return `
        <header class="sticky top-0 z-40 ${isAdmin ? 'bg-slate-950 text-white' : 'bg-white text-slate-900'} shadow-sm border-b ${isAdmin ? 'border-slate-800' : 'border-slate-200'}">
          <div class="px-4 md:px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-2xl ${isAdmin ? 'bg-emerald-400 text-slate-950' : 'bg-indigo-600 text-white'} flex items-center justify-center font-black">BH</div>
              <div>
                <h1 class="text-xl md:text-2xl font-black leading-tight">${title}</h1>
                <p class="text-xs ${isAdmin ? 'text-slate-400' : 'text-slate-500'}">${subtitle}</p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              <button onclick="switchRole('marketplace')" class="px-4 py-2 rounded-xl text-xs font-black bg-indigo-600 text-white">
                Marketplace B2B
              </button>
              <button onclick="switchRole('tender')" class="px-4 py-2 rounded-xl text-xs font-black bg-amber-400 text-slate-950">
                Bursa Tender
              </button>
              <button onclick="switchRole('${isAdmin ? 'user' : 'admin'}')" class="px-4 py-2 rounded-xl text-xs font-black ${isAdmin ? 'bg-white text-slate-950' : 'bg-slate-900 text-white'}">
                Masuk ${isAdmin ? 'User' : 'Admin'} Demo
              </button>
              <button onclick="resetCurrentDashboard()" class="px-4 py-2 rounded-xl text-xs font-black bg-amber-400 text-slate-950">
                Reset Halaman Ini
              </button>
            </div>
          </div>
        </header>
      `;
    }

    function renderLayout(options) {
      const { roleClass, title, subtitle, sidebar, content, isAdmin } = options;

      document.getElementById('app').innerHTML = `
        ${renderHeader(title, subtitle, isAdmin)}
        <div class="dashboard-layout ${roleClass} flex gap-5 p-4 md:p-6 max-w-[1500px] mx-auto">
          <aside class="sidebar ${isAdmin ? 'bg-slate-950 text-white' : 'bg-white'} rounded-[28px] border ${isAdmin ? 'border-slate-800' : 'border-slate-200'} shadow-sm h-fit sticky top-24 overflow-hidden">
            <div class="p-5 border-b ${isAdmin ? 'border-slate-800' : 'border-slate-100'}">
              <p class="text-xs font-black uppercase tracking-widest ${isAdmin ? 'text-emerald-300' : 'text-indigo-600'}">${isAdmin ? 'Admin Pusat' : 'Dashboard User'}</p>
              <h2 class="font-black mt-1">${state.name}</h2>
            </div>
            <nav class="sidebar-menu p-3 grid gap-2">${sidebar}</nav>
          </aside>
          <main class="flex-1 min-w-0">${content}</main>
        </div>
      `;
    }

    function switchRole(role) {
      state.role = role;
      state.name = role === 'admin' ? 'Admin Pusat' : role === 'user' ? 'User Demo' : 'Pengunjung';
      state.adminMenu = 'overview';
      state.userMenu = 'overview';
      state.adminSub = 'Ringkasan';
      state.userSub = 'Ringkasan';
      saveState();
      renderApp();
      showToast(role === 'marketplace' ? 'Masuk Marketplace B2B' : role === 'tender' ? 'Masuk Bursa Tender' : `Masuk sebagai ${role.toUpperCase()}`);
    }

    function resetCurrentDashboard() {
      const role = state.role;
      const adminMenu = state.adminMenu;
      const userMenu = state.userMenu;

      if (role === 'marketplace' || role === 'tender') {
        state = {
          ...state,
          role,
          name: 'Pengunjung'
        };
      } else if (role === 'admin') {
        state = {
          ...state,
          role: 'admin',
          name: 'Admin Pusat',
          adminMenu,
          adminSub: (adminSubs[adminMenu] || ['Ringkasan'])[0]
        };
      } else {
        state = {
          ...state,
          role: 'user',
          name: 'User Demo',
          userMenu,
          userSub: (userSubs[userMenu] || ['Ringkasan'])[0]
        };
      }

      saveState();
      renderApp();
      showToast('Reset hanya di halaman ini, tidak pindah akun');
    }

    function renderMenuButtons(menuList, activeKey, role) {
      return menuList.map(item => {
        const isActive = item.key === activeKey;
        const activeClass = role === 'admin' ? 'active-admin' : 'active-user';
        const idleClass = role === 'admin' ? 'idle-admin' : 'idle-user';
        const click = role === 'admin' ? `setAdminMenu('${item.key}')` : `setUserMenu('${item.key}')`;

        return `
          <button onclick="${click}" class="menu-button ${isActive ? activeClass : idleClass}">
            <i class="fa-solid ${item.icon} w-5 text-center"></i>
            <span>${item.label}</span>
          </button>
        `;
      }).join('');
    }

    function renderSubTabs(subs, activeSub, setterName) {
      return `
        <div class="mb-5 overflow-x-auto">
          <div class="flex gap-2 min-w-max">
            ${subs.map(sub => `<button onclick="${setterName}('${sub}')" class="sub-tab ${sub === activeSub ? 'active' : ''}">${sub}</button>`).join('')}
          </div>
        </div>
      `;
    }

    function setAdminMenu(key) {
      state.adminMenu = key;
      state.adminSub = (adminSubs[key] || ['Ringkasan'])[0];
      saveState();
      renderAdminDashboard();
    }

    function setAdminSub(sub) {
      state.adminSub = sub;
      saveState();
      renderAdminDashboard();
    }

    function setUserMenu(key) {
      state.userMenu = key;
      state.userSub = (userSubs[key] || ['Ringkasan'])[0];
      saveState();
      renderUserDashboard();
    }

    function setUserSub(sub) {
      state.userSub = sub;
      saveState();
      renderUserDashboard();
    }


    function renderMarketplace() {
      const productCards = marketplaceProducts.map(product => `
        <div class="content-card p-4 hover:-translate-y-1 transition">
          <div class="h-36 rounded-2xl bg-slate-100 flex items-center justify-center mb-4">
            <i class="fa-solid ${product.icon} text-4xl text-indigo-400"></i>
          </div>
          <div class="flex items-center justify-between gap-2 mb-2">
            ${badge(product.badge, product.badge === 'TKDN' ? 'rose' : 'indigo')}
            <span class="text-[10px] font-black text-slate-400 uppercase">${product.category}</span>
          </div>
          <h3 class="font-black leading-tight min-h-[48px]">${product.name}</h3>
          <p class="text-xs text-slate-500 mt-2"><i class="fa-solid fa-building mr-1"></i>${product.seller}</p>
          <div class="mt-4 flex items-center justify-between gap-3">
            <b class="text-amber-600">${product.price}</b>
            <button onclick="showToast('Produk masuk keranjang demo')" class="bg-indigo-600 text-white rounded-xl px-3 py-2 text-xs font-black">Tambah</button>
          </div>
        </div>
      `).join('');

      document.getElementById('app').innerHTML = `
        <header class="sticky top-0 z-40 bg-gradient-to-r from-indigo-700 to-slate-950 text-white shadow-sm border-b border-indigo-900">
          <div class="px-4 md:px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3 max-w-[1500px] mx-auto">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-2xl bg-amber-400 text-indigo-950 flex items-center justify-center font-black">BH</div>
              <div>
                <h1 class="text-xl md:text-2xl font-black leading-tight">BisnisHub Marketplace B2B</h1>
                <p class="text-xs text-indigo-100">Etalase produk industri, seller, tender, dan akun dashboard.</p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              <button onclick="switchRole('tender')" class="px-4 py-2 rounded-xl text-xs font-black bg-amber-400 text-indigo-950">Bursa Tender</button>
              <button onclick="switchRole('user')" class="px-4 py-2 rounded-xl text-xs font-black bg-white text-indigo-950">Dashboard User</button>

    }

    function userWishlist() {
      return panel('Wishlist', 'Produk favorit user.', `
        <div class="grid md:grid-cols-3 gap-4">
          ${demoProducts.slice(0, 3).map(product => `
            <div class="border rounded-2xl p-4">
              <div class="h-28 rounded-xl bg-slate-100 flex items-center justify-center mb-3">
                <i class="fa-solid fa-box text-3xl text-slate-300"></i>
              </div>
              <b>${product[0]}</b>
              <p class="font-black text-amber-600 mt-2">${product[2]}</p>
              <div class="mt-3">${actionButton('Beli')}</div>
            </div>
          `).join('')}
        </div>
      `);
    }

    function userAddress() {
      return panel('Alamat Proyek', 'Kelola alamat kantor, gudang, dan proyek.', `
        <div class="grid md:grid-cols-2 gap-4">
          <div class="border rounded-2xl p-4">
            <b>Kantor Pusat</b>
            <p class="text-sm text-slate-500 mt-1">Jakarta Selatan</p>
          </div>
          <div class="border rounded-2xl p-4">
            <b>Gudang Proyek</b>
            <p class="text-sm text-slate-500 mt-1">Karawang</p>
          </div>
        </div>
        <button onclick="showToast('Alamat ditambahkan')" class="mt-4 bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Tambah Alamat</button>
      `);
    }

    function userSupport() {
      const rows = demoTickets.map(ticket => `
        <tr>
          <td class="font-black">${ticket[0]}</td>
          <td>${ticket[2]}</td>
          <td>${badge(ticket[4], statusColor(ticket[4]))}</td>
          <td>${actionButton('Balas')}</td>
        </tr>
      `);

      return panel('Bantuan / Tiket', 'Tiket bantuan user.', table(['ID', 'Topik', 'Status', 'Aksi'], rows), actionButton('Buat Tiket', 'rose'));
    }

    function userNotifications() {
      return panel('Notifikasi', 'Pesan order, promo, dan sistem.', `
        <div class="space-y-3">
          <div class="p-4 rounded-2xl bg-slate-50 border"><b>Pesanan INV-001 sedang dikirim.</b><p class="text-xs text-slate-500 mt-1">1 jam lalu</p></div>
          <div class="p-4 rounded-2xl bg-slate-50 border"><b>Produk draft perlu dilengkapi gambar.</b><p class="text-xs text-slate-500 mt-1">3 jam lalu</p></div>
          <div class="p-4 rounded-2xl bg-slate-50 border"><b>Promo seller aktif minggu ini.</b><p class="text-xs text-slate-500 mt-1">Kemarin</p></div>
        </div>
      `);
    }

    function userSecurity() {
      return panel('Keamanan', 'Password, OTP, dan perangkat login.', `
        <div class="grid md:grid-cols-2 gap-4">
          <div class="border rounded-2xl p-5">
            <b>Password</b>
            <p class="text-sm text-slate-500 mt-1">Terakhir diubah 30 hari lalu.</p>
            <div class="mt-3">${actionButton('Ubah Password')}</div>
          </div>
          <div class="border rounded-2xl p-5">
            <b>OTP Login</b>
            <p class="text-sm text-slate-500 mt-1">Belum aktif.</p>
            <div class="mt-3">${actionButton('Aktifkan OTP', 'emerald')}</div>
          </div>
        </div>
      `);
    }

    function userProfile() {
      return panel('Profil User', 'Biodata dan preferensi user.', `
        <div class="grid md:grid-cols-2 gap-4">
          <input id="profileName" class="border rounded-2xl p-3" value="${state.name}">
          <input class="border rounded-2xl p-3" value="user@demo.id">
          <input class="border rounded-2xl p-3" placeholder="No. WhatsApp">
          <select class="border rounded-2xl p-3">
            <option>Perusahaan</option>
            <option>Perorangan</option>
          </select>
        </div>
        <button onclick="saveProfile()" class="mt-5 bg-indigo-600 text-white rounded-2xl px-5 py-3 font-black">Simpan Profil</button>
      `);
    }

    function saveProfile() {
      const input = document.getElementById('profileName');
      state.name = input.value || 'User Demo';
      saveState();
      renderUserDashboard();
      showToast('Profil tersimpan');
    }

    renderApp();
  </script>
</body>
</html>
